name: Daily US News Discord Briefing

on:
  schedule:
    # GitHub cron is UTC. Hobart is UTC+11 during daylight saving time
    # and UTC+10 during standard time. Both schedules run; the timezone
    # guard below sends only when the local Hobart hour is 08.
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      MAX_ARTICLES: "8"
      LOCAL_TIMEZONE: "Australia/Hobart"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Hobart schedule window
        id: schedule_window
        run: |
          local_hour="$(TZ="$LOCAL_TIMEZONE" date +%H)"
          local_time="$(TZ="$LOCAL_TIMEZONE" date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Hobart local time: $local_time"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run detected; skipping schedule gate."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$local_hour" = "08" ]; then
            echo "Scheduled run is inside the Hobart 08:00 hour."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Scheduled run is outside the Hobart 08:00 hour; skipping send."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check required secrets
        if: steps.schedule_window.outputs.should_run == 'true'
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Missing GitHub Actions secret: DISCORD_WEBHOOK_URL"
            echo "Create it at repository Settings > Secrets and variables > Actions > Repository secrets."
            exit 2
          fi

      - name: Run daily briefing
        if: steps.schedule_window.outputs.should_run == 'true'
        run: python -m news_briefing.main
