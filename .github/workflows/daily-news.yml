name: Daily US News Discord Briefing

on:
  schedule:
    # Runs once per day. The Python app uses Australia/Hobart timezone logic
    # when labeling and filtering the briefing.
    - cron: "30 20 * * *"
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      MAX_ARTICLES: "5"
      LOCAL_TIMEZONE: "Australia/Hobart"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check required secrets
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::Missing GitHub Actions secret: DISCORD_WEBHOOK_URL"
            echo "Create it at repository Settings > Secrets and variables > Actions > Repository secrets."
            exit 2
          fi

      - name: Run daily briefing
        run: python -m news_briefing.main
